<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denisse's Reading Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <span class="app-icon">📚</span>
      <h1>Denisse's Reading Tracker</h1>
    </div>
    <button class="btn-primary" id="new-task-btn">+ New Task</button>
  </header>

  <main>
    <div id="task-list"></div>
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">📖</div>
      <p>No reading tasks yet.</p>
      <p class="empty-sub">Click <strong>+ New Task</strong> to get started.</p>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2 id="modal-title">New Reading Task</h2>

      <div class="form-group">
        <label for="book-input">Book Name</label>
        <input
          type="text"
          id="book-input"
          list="book-suggestions"
          placeholder="e.g. The Alchemist"
          autocomplete="off"
        >
        <datalist id="book-suggestions"></datalist>
      </div>

      <div class="form-group">
        <label for="pages-input">Page Ranges</label>
        <input
          type="text"
          id="pages-input"
          placeholder="e.g. 1-10, 20-25, 30-40"
          autocomplete="off"
        >
        <span class="pages-preview" id="pages-preview"></span>
      </div>

      <div class="form-group">
        <label for="due-date-input">Due Date</label>
        <input type="date" id="due-date-input">
      </div>

      <div class="form-error hidden" id="form-error"></div>

      <div class="modal-actions">
        <button class="btn-secondary" id="cancel-btn">Cancel</button>
        <button class="btn-primary" id="save-btn">Save Task</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
